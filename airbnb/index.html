<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Airbnb 수익 예측 — Stargate Visual Lab</title>
<meta name="description" content="서울 에어비앤비 가격 분포·자치구별 점유율·월 수익 예측 대시보드. Plotly.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%A0%3C/text%3E%3C/svg%3E">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
:root{--bg:#0a0d14;--panel:#0f172a;--panel2:#111c33;--line:#1f2a44;--line2:#263452;
  --ink:#e6edf3;--sub:#9aa7b8;--muted:#6b7a90;--acc:#7aa2ff;--good:#63d6a0;--warm:#ffb86b;
  --grad1:linear-gradient(135deg,#4f7fff,#7aa2ff 55%,#b388ff);}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;
  background-image:radial-gradient(1000px 600px at 10% -10%,rgba(79,127,255,.16),transparent 60%),radial-gradient(800px 500px at 100% 0,rgba(179,136,255,.1),transparent 60%);background-attachment:fixed;-webkit-font-smoothing:antialiased}
a{color:var(--acc);text-decoration:none}.wrap{max-width:1080px;margin:0 auto;padding:24px 22px 90px}
.nav{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--sub)}
.nav a{color:var(--sub)}.nav a:hover{color:var(--ink)}
h1{font-size:30px;letter-spacing:-.4px;margin:26px 0 6px;background:var(--grad1);-webkit-background-clip:text;background-clip:text;color:transparent}
.lead{color:var(--sub);font-size:15px;margin:0 0 8px;max-width:72ch}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 22px}
.chip{border:1px solid var(--line2);background:var(--panel);color:var(--sub);padding:5px 10px;border-radius:999px;font-size:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:14px}
.stat .l{color:var(--muted);font-size:12px}.stat .v{font-size:22px;font-weight:700;margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:16px;padding:16px;margin-bottom:16px}
.card.wide{grid-column:1/-1}
.card h2{margin:0 0 2px;font-size:16px}.card .d{color:var(--sub);font-size:12.5px;margin-bottom:8px}
.plot{width:100%;height:320px}
@media(max-width:820px){.stats{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="nav"><a href="../">← Stargate Visual Lab</a><a href="https://www.stargateedu.co.kr/">포털</a></div>
  <h1>서울 Airbnb 수익 예측</h1>
  <p class="lead">서울 단기숙박 시장의 가격 분포, 자치구별 점유율, 향후 6개월 수익 예측을 한 화면에서 봅니다. 데모 시드 데이터 기반.</p>
  <div class="chips"><span class="chip">Revenue Forecast</span><span class="chip">Occupancy</span><span class="chip">RevPAR</span><span class="chip">Real Estate · ML</span></div>

  <div class="stats" id="stats"></div>

  <div class="grid2">
    <div class="card">
      <h2>1박 가격 분포</h2><div class="d">리스팅 1박 요금(만원) 히스토그램. 우측 롱테일(고급 숙소).</div>
      <div id="price" class="plot"></div>
    </div>
    <div class="card">
      <h2>자치구별 점유율</h2><div class="d">상위 8개 자치구 평균 점유율(%).</div>
      <div id="occ" class="plot"></div>
    </div>
    <div class="card wide">
      <h2>월 수익 예측 (실적 + 6개월 전망)</h2><div class="d">실적(파랑) 이후 예측(점선)과 80% 신뢰구간(음영).</div>
      <div id="fc" class="plot" style="height:340px"></div>
    </div>
  </div>
</div>

<script>
const ACC='#7aa2ff', GOOD='#63d6a0', WARM='#ffb86b', LINE='#21304f', SUB='#9aa7b8';
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const rng=mulberry32(20260711);
const baseLayout=(extra)=>Object.assign({
  paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',
  font:{color:SUB,family:'Pretendard,system-ui,sans-serif',size:12},
  margin:{l:52,r:16,t:10,b:40},
  xaxis:{gridcolor:LINE,zerolinecolor:LINE},yaxis:{gridcolor:LINE,zerolinecolor:LINE}
},extra||{});
const cfg={responsive:true,displayModeBar:false};

// ① 가격 분포 (로그정규 근사)
const prices=[]; for(let i=0;i<600;i++){let u=0;for(let k=0;k<3;k++)u+=rng();const v=Math.exp(1.9+ (u/3-0.5)*1.1);prices.push(Math.round(v*10))}
Plotly.newPlot('price',[{x:prices,type:'histogram',nbinsx:32,marker:{color:ACC,line:{color:'#0a0d14',width:1}},opacity:.9}],
  baseLayout({xaxis:{title:'1박 요금(만원)',gridcolor:LINE},yaxis:{title:'리스팅 수',gridcolor:LINE},bargap:.04}),cfg);

// ② 자치구별 점유율
const gu=['마포','용산','종로','중구','강남','성동','서대문','광진'];
const occ=gu.map((_,i)=>Math.round(58+Math.cos(i/1.5)*10+rng()*8));
const pair=gu.map((g,i)=>[g,occ[i]]).sort((a,b)=>a[1]-b[1]);
Plotly.newPlot('occ',[{y:pair.map(p=>p[0]),x:pair.map(p=>p[1]),type:'bar',orientation:'h',
  marker:{color:pair.map(p=>p[1]),colorscale:[[0,'#31519e'],[1,'#7aa2ff']],line:{color:'#0a0d14',width:1}},
  hovertemplate:'%{y} · %{x}%<extra></extra>'}],
  baseLayout({xaxis:{title:'점유율(%)',gridcolor:LINE,range:[0,85]},yaxis:{gridcolor:'rgba(0,0,0,0)'},margin:{l:56,r:16,t:10,b:40}}),cfg);

// ③ 월 수익 예측
const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const fut=['+1월','+2월','+3월','+4월','+5월','+6월'];
const actual=months.map((_,i)=>Math.round(820+Math.sin(i/2)*120+i*14+(rng()-0.5)*60));
const last=actual[actual.length-1];
const fc=fut.map((_,i)=>Math.round(last+ (i+1)*22 + Math.sin((11+i)/2)*90));
const band=fc.map((v,i)=>Math.round(60+ (i+1)*22));
const allX=months.concat(fut);
Plotly.newPlot('fc',[
  // CI 밴드
  {x:fut.concat([...fut].reverse()),
   y:fc.map((v,i)=>v+band[i]).concat([...fc.map((v,i)=>v-band[i])].reverse()),
   fill:'toself',fillcolor:'rgba(122,162,255,.13)',line:{color:'rgba(0,0,0,0)'},name:'80% CI',hoverinfo:'skip'},
  {x:months,y:actual,mode:'lines+markers',name:'실적',line:{color:ACC,width:2.5},marker:{size:6}},
  {x:[months[months.length-1]].concat(fut),y:[last].concat(fc),mode:'lines+markers',name:'예측',
   line:{color:GOOD,width:2.5,dash:'dot'},marker:{size:6}}
], baseLayout({
  legend:{orientation:'h',y:1.14,x:0},
  xaxis:{gridcolor:LINE,categoryorder:'array',categoryarray:allX},
  yaxis:{title:'월 수익(만원)',gridcolor:LINE}
}), cfg);

// KPI
const avgP=Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
const avgOcc=Math.round(occ.reduce((a,b)=>a+b,0)/occ.length);
const revpar=Math.round(avgP*avgOcc/100*10)/10;
document.getElementById('stats').innerHTML=[
  ['평균 1박 요금', avgP.toLocaleString()+'만원'],
  ['평균 점유율', avgOcc+'%'],
  ['RevPAR', revpar+'만원'],
  ['6개월 후 예측수익', fc[5].toLocaleString()+'만원']
].map(([l,v])=>`<div class="stat"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('');
</script>
</body>
</html>
