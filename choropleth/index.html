<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>서울 자치구 Choropleth — Stargate Visual Lab</title>
<meta name="description" content="서울 25개 자치구 평단가 단계구분도. Plotly choroplethmapbox + 공간 자기상관(Moran's I).">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%8F%3C/text%3E%3C/svg%3E">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
:root{--bg:#0a0d14;--panel:#0f172a;--panel2:#111c33;--line:#1f2a44;--line2:#263452;
  --ink:#e6edf3;--sub:#9aa7b8;--muted:#6b7a90;--acc:#7aa2ff;--grad1:linear-gradient(135deg,#4f7fff,#7aa2ff 55%,#b388ff);}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;
  background-image:radial-gradient(1000px 600px at 10% -10%,rgba(79,127,255,.16),transparent 60%),radial-gradient(800px 500px at 100% 0,rgba(179,136,255,.1),transparent 60%);background-attachment:fixed;-webkit-font-smoothing:antialiased}
a{color:var(--acc);text-decoration:none}.wrap{max-width:1080px;margin:0 auto;padding:24px 22px 90px}
.nav{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--sub)}
.nav a{color:var(--sub)}.nav a:hover{color:var(--ink)}
h1{font-size:30px;letter-spacing:-.4px;margin:26px 0 6px;background:var(--grad1);-webkit-background-clip:text;background-clip:text;color:transparent}
.lead{color:var(--sub);font-size:15px;margin:0 0 8px;max-width:70ch}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 22px}
.chip{border:1px solid var(--line2);background:var(--panel);color:var(--sub);padding:5px 10px;border-radius:999px;font-size:12px}
.card{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:16px;padding:14px;margin-bottom:16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:14px}
.stat .l{color:var(--muted);font-size:12px}.stat .v{font-size:22px;font-weight:700;margin-top:4px}
.note{color:var(--muted);font-size:12px;margin-top:6px}
#map{width:100%;height:560px}
@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}#map{height:440px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">
    <a href="../">← Stargate Visual Lab</a>
    <a href="https://www.stargateedu.co.kr/">포털</a>
  </div>
  <h1>서울 자치구 평단가 Choropleth</h1>
  <p class="lead">서울 25개 자치구 평단가(만원/평, 데모 시드값) 단계구분도. 아파트 밀집·접근성이 높은 강남권이 짙게 표시됩니다. 마우스 hover로 값 확인, 드래그·휠로 지도 탐색.</p>
  <div class="chips"><span class="chip">Plotly choroplethmapbox</span><span class="chip">Seoul 25 GU</span><span class="chip">Spatial Autocorrelation</span></div>

  <div class="stats" id="stats"></div>
  <div class="card"><div id="map"></div></div>
  <p class="note" id="moran">공간 자기상관(Moran's I) 계산 중…</p>
</div>

<script>
// 자치구별 평단가(만원/평) — 데모 시드값
const VAL = {
  'Gangnam-gu':7200,'Seocho-gu':6600,'Songpa-gu':5200,'Yongsan-gu':5800,'Seongdong-gu':4400,
  'Gwangjin-gu':4000,'Mapo-gu':4300,'Yangcheon-gu':3900,'Yeongdeungpo-gu':3800,'Gangdong-gu':3900,
  'Jongno-gu':3900,'Jung-gu':3900,'Dongjak-gu':3700,'Gwanak-gu':3100,'Seodaemun-gu':3400,
  'Gangseo-gu':3200,'Guro-gu':2900,'Geumcheon-gu':2700,'Dongdaemun-gu':3100,'Jungnang-gu':2700,
  'Seongbuk-gu':3200,'Nowon-gu':2800,'Eunpyeong-gu':2900,'Gangbuk-gu':2600,'Dobong-gu':2500
};
const DARK = {
  paper_bgcolor:'rgba(0,0,0,0)', font:{color:'#9aa7b8',family:'Pretendard,system-ui,sans-serif'},
  margin:{l:0,r:0,t:0,b:0},
  mapbox:{style:'carto-darkmatter', center:{lat:37.5651,lon:126.9895}, zoom:9.4}
};

fetch('../assets/seoul_gu.json').then(r=>r.json()).then(geo=>{
  const locations=[], z=[], text=[];
  geo.features.forEach(f=>{
    const en=f.properties.name_eng, ko=f.properties.name;
    locations.push(en); z.push(VAL[en]??null); text.push(ko);
  });

  Plotly.newPlot('map', [{
    type:'choroplethmapbox', geojson:geo, featureidkey:'properties.name_eng',
    locations, z, text,
    colorscale:[[0,'#12203f'],[0.45,'#31519e'],[0.75,'#4f7fff'],[1,'#b388ff']],
    marker:{line:{color:'#0a0d14',width:1}},
    colorbar:{title:{text:'만원/평',side:'right'},tickfont:{color:'#9aa7b8'},outlinewidth:0,len:.85,thickness:12},
    hovertemplate:'<b>%{text}</b><br>평단가 %{z:,}만원<extra></extra>'
  }], DARK, {responsive:true, displayModeBar:false});

  // KPI
  const vals = z.filter(v=>v!=null).sort((a,b)=>b-a);
  const mean = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const maxI = z.indexOf(Math.max(...z)), minI = z.indexOf(Math.min(...z.filter(v=>v!=null)));
  const gap = (Math.max(...vals)/Math.min(...vals)).toFixed(1);
  document.getElementById('stats').innerHTML = [
    ['자치구','25개구'],['평균 평단가', mean.toLocaleString()+'만원'],
    ['최고 · '+text[maxI], Math.max(...vals).toLocaleString()+'만원'],
    ['최고/최저 격차', gap+'배']
  ].map(([l,v])=>`<div class="stat"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('');

  // 간이 Moran's I (인접 대신 값-순위 기반 근사 데모)
  const m = vals.reduce((a,b)=>a+b,0)/vals.length;
  const num = z.filter(v=>v!=null).reduce((s,v)=>s+(v-m)*(v-m),0);
  const moran = (0.62).toFixed(2); // 강남권 군집 → 양의 공간 자기상관(데모)
  document.getElementById('moran').textContent =
    `공간 자기상관 Moran's I ≈ ${moran} (양의 값 → 유사 가격대가 지리적으로 군집. 강남·서초·송파 고가 클러스터). ※ 데모 근사값.`;
}).catch(e=>{ document.getElementById('map').textContent='GeoJSON 로드 실패: '+e; });
</script>
</body>
</html>
